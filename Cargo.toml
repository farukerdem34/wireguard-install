[package]
name = "wireguard-install"
version = "0.1.0"
edition = "2024"

[dependencies]
dialoguer = "0.12.0"
dotenv = "0.15.0"
heim-virt = "0.0.11"
libc = "0.2.180"
netwatcher = "0.4.1"
qrcode = "0.14.1"
rand = "0.9.2"
regex = "1.10.0"
tokio = { version = "1.49.0", features = ["full"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true
